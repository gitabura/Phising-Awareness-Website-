<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Phishing Awareness</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">Phishing Awareness</h1>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="phishing.html">What is Phishing?</a></li>
            <li><a href="types.html">Types</a></li>
            <li><a href="identify.html">Identify</a></li>
            <li><a href="safety.html">Safety Tips</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>Contact Us</h2>
    <p>
        Have questions or feedback? Fill out the form below.
    </p>
</section>

<section class="features">
    <div class="card">

        <form onsubmit="showMessage(); return false;">

            <label>Name</label><br>
            <input type="text" id="name" required><br><br>

            <label>Email</label><br>
            <input type="email" id="email" required><br><br>

            <label>Message</label><br>
            <textarea id="message" rows="5" required></textarea><br><br>

            <button class="btn" type="submit">
                Send Message
            </button>

        </form>

        <p id="success"></p>

    </div>
</section>

<footer>
    <p>© 2026 Phishing Awareness Website | Created by Geeta Bura</p>
</footer>

<script>
function showMessage(){
    document.getElementById("success").innerHTML =
    "✅ Thank you! Your message has been submitted successfully.";

    document.getElementById("name").value="";
    document.getElementById("email").value="";
    document.getElementById("message").value="";
}
</script>

</body>
</html>
